<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<style>
/* ---------------- General ---------------- */
body, html {
  margin:0; padding:0;
  font-family: Arial, sans-serif;
  background:#ffeef0;
  overflow-x:hidden;
  text-align:center;
}

.page { display:none; padding:50px 20px; }
.page.active { display:block; }

h1, h2 { color:#ff4b6e; margin-bottom:20px; }

/* ---------------- Buttons ---------------- */
button {
  padding:10px 20px;
  background:#ff4b6e;
  color:white;
  border:none;
  border-radius:10px;
  font-size:1rem;
  cursor:pointer;
  margin:10px;
}
button:hover { background:#ff2d57; }

/* ---------------- Hearts & Confetti ---------------- */
#hearts, #confetti {
  position:fixed;
  bottom:0; left:0;
  width:100%; height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:-1;
}
.heart, .confettiPiece {
  position:absolute;
  width:20px; height:20px;
  background:red;
  clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 80%, 20% 100%, 0% 35%);
  animation: float 5s linear infinite;
}
@keyframes float {
  0% { transform: translateY(0px) scale(1); }
  50% { transform: translateY(-200px) scale(1.2); }
  100% { transform: translateY(0px) scale(1); }
}

/* ---------------- Slideshow ---------------- */
.slideshow-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin: 0 auto;
  max-width: 600px;
}

.slide-img {
  width: 80%;
  max-width: 500px;
  border-radius:15px;
  margin-bottom:10px;
}

.caption {
  font-size:1.1rem;
  color:#333;
  margin-bottom:15px;
}

.nav-buttons {
  display:flex;
  justify-content:space-between;
  width:80%;
  max-width:500px;
}

/* ---------------- Typing ---------------- */
#typing {
  font-size:1.2rem;
  color:#333;
  max-width:600px;
  margin:20px auto;
  min-height:80px;
}
</style>
</head>
<body>

<!-- ---------------- Page 1: Start / Play ---------------- -->
<div class="page active" id="page1">
  <h1>🎉 Birthday Surprise 🎉</h1>
  <button id="startBtn">Start</button>
</div>

<!-- ---------------- Page 2: Photo Slideshow ---------------- -->
<div class="page" id="page2">
  <div class="slideshow-container">
    <img src="photo1.jpg" class="slide-img" id="slideImage">
    <div class="caption" id="slideCaption">Caption for photo 1</div>
    <div class="nav-buttons">
      <button id="prevBtn">Previous</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>
</div>

<!-- ---------------- Page 3: Typing Paragraph ---------------- -->
<div class="page" id="page3">
  <h2>Things I Love About You</h2>
  <p id="typing"></p>
  <button onclick="showPage(4)">Next</button>
</div>

<!-- ---------------- Page 4: Surprise Video ---------------- -->
<div class="page" id="page4">
  <h2>🎁 Surprise! 🎁</h2>
  <div id="confetti"></div>
  <button id="revealVideo">Reveal Video</button>
  <video id="surpriseVideo" width="80%" controls style="display:none; margin-top:15px;">
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<audio id="bgSong" src="song.mp3"></audio>
<div id="hearts"></div>

<script>
// ---------------- Globals ----------------
const bgSong = document.getElementById("bgSong");
const heartsContainer = document.getElementById("hearts");
const confettiContainer = document.getElementById("confetti");

let currentPage = 1;

// ---------------- Page Navigation ----------------
function showPage(pageNum){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page"+pageNum).classList.add("active");
  currentPage = pageNum;
}

// ---------------- Start Button ----------------
document.getElementById("startBtn").addEventListener("click", ()=>{
  bgSong.play().catch(err=>console.log("Autoplay blocked:", err));
  showPage(2);
});

// ---------------- Heart Animation ----------------
function createHeart(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random()*100+"%";
  heart.style.animationDuration = 3+Math.random()*2+"s";
  heartsContainer.appendChild(heart);
  setTimeout(()=>heart.remove(),5000);
}
setInterval(createHeart,300);

// ---------------- Slideshow ----------------
const images = ["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg","photo5.jpg","photo6.jpg","photo7.jpg","photo8.jpg","photo9.jpg","photo10.jpg"];
const captions = [
  "Caption 1","Caption 2","Caption 3","Caption 4","Caption 5",
  "Caption 6","Caption 7","Caption 8","Caption 9","Caption 10"
];

let slideIndex = 0;
const slideImage = document.getElementById("slideImage");
const slideCaption = document.getElementById("slideCaption");

function showSlide(index){
  slideImage.src = images[index];
  slideCaption.textContent = captions[index];
}

document.getElementById("prevBtn").addEventListener("click", ()=>{
  slideIndex = (slideIndex-1+images.length)%images.length;
  showSlide(slideIndex);
});
document.getElementById("nextBtn").addEventListener("click", ()=>{
  slideIndex = (slideIndex+1)%images.length;
  showSlide(slideIndex);
});

// Initialize first slide
showSlide(slideIndex);

// ---------------- Typing Animation ----------------
const typingText = "Sometimes life gives us moments that feel small, yet they carry the biggest pieces of our hearts. Every smile, every memory, every quiet laugh becomes a story only we can tell. Through ups and downs, the little joys stay with us, making the ordinary feel extraordinary.";
function startTyping(){
  const typingEl = document.getElementById("typing");
  let i=0;
  typingEl.innerHTML="";
  const interval = setInterval(()=>{
    if(i<typingText.length){
      typingEl.innerHTML += typingText.charAt(i);
      i++;
    } else clearInterval(interval);
  },40);
}

// ---------------- Reveal Video ----------------
document.getElementById("revealVideo").addEventListener("click", ()=>{
  // Confetti & hearts
  for(let i=0;i<100;i++){
    const confetti = document.createElement("div");
    confetti.classList.add("confettiPiece");
    confetti.style.left = Math.random()*100+"%";
    confetti.style.background = ["#ff4b6e","#ffb347","#fffc47","#47fffc"][Math.floor(Math.random()*4)];
    confettiContainer.appendChild(confetti);
    setTimeout(()=>confetti.remove(),2000);
  }
  document.getElementById("surpriseVideo").style.display="block";
});
</script>
</body>
</html>
